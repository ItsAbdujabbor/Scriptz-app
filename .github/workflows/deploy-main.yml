name: Deploy main to clixa.app

# Auto-deploys main → S3 bucket behind clixa.app, then invalidates
# the CloudFront cache so the new build is visible immediately.
#
# Auth: GitHub OIDC. The role `clixa-gha-deploy-frontend` is trusted
# only for `repo:ItsAbdujabbor/Scriptz-app:ref:refs/heads/main`, so PRs
# and forks cannot assume it. Permissions are scoped to:
#   * s3:PutObject/DeleteObject/ListBucket on clixa-app-195874016451
#   * cloudfront:CreateInvalidation/GetInvalidation on ECPKX3YV9V9CH
# Role ARN comes from the repo secret AWS_DEPLOY_ROLE_ARN.
#
# Replaces the prior IAM-keys flow (AWS_ACCESS_KEY_ID +
# AWS_SECRET_ACCESS_KEY) which was never configured and silently
# failed on every push — push trigger had to be disabled to stop the
# failure-email spam. OIDC removes the long-lived keys entirely AND
# makes the push trigger safe to re-enable.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to mint the OIDC token for AssumeRoleWithWebIdentity
  contents: read

concurrency:
  # Cancel in-flight deploys from older commits on the same branch so we
  # never overwrite a newer build with an older one.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

  build-and-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: clixa-app-195874016451
      CLOUDFRONT_DISTRIBUTION_ID: ECPKX3YV9V9CH

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-frontend-${{ github.run_id }}

      # 1. Hashed assets → always upload fresh so Content-Type and
      #    Cache-Control are guaranteed, even on reruns where the
      #    bundle hash is unchanged. `aws s3 cp` infers Content-Type
      #    from the file extension (.js → application/javascript,
      #    .css → text/css) — critical because browsers refuse to
      #    execute `type="module"` scripts with a wrong MIME type.
      - name: Upload hashed assets to S3 (immutable cache)
        run: |
          aws s3 cp dist/assets/ s3://${{ env.S3_BUCKET }}/assets/ \
            --recursive \
            --cache-control "public, max-age=31536000, immutable"

      # 2. Top-level files (index.html, favicon, icons) — no cache so
      #    routing and SEO updates reach users on the next request.
      #    `--delete` cleans up removed top-level files; `--exclude
      #    "assets/*"` leaves the hashed asset folder untouched.
      - name: Sync top-level files to S3 (no cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache, must-revalidate"

      # 3. Wipe CloudFront so /index.html and any pathname-fallback
      #    routes (403/404 → /index.html) serve the new bundle.
      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation $INVALIDATION_ID queued"
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id "$INVALIDATION_ID"
          echo "Invalidation $INVALIDATION_ID completed"

      - name: Summary
        run: |
          echo "### Deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bucket:** s3://${{ env.S3_BUCKET }}/" >> $GITHUB_STEP_SUMMARY
          echo "- **Distribution:** ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Live URL:** https://clixa.app" >> $GITHUB_STEP_SUMMARY
