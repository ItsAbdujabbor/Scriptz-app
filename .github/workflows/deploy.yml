name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ vars.S3_APP_BUCKET }}
  CF_DISTRIBUTION_ID: ${{ vars.CF_APP_DISTRIBUTION_ID }}

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # All VITE_* values are baked into the bundle at build time. Configure
          # via repo Settings → Variables (non-secret) and Secrets (sensitive).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_PADDLE_ENV: ${{ vars.VITE_PADDLE_ENV }}
          VITE_PADDLE_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
          VITE_BREVO_LIST_ID: ${{ vars.VITE_BREVO_LIST_ID }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (immutable assets)
        run: |
          aws s3 sync dist/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"

      - name: Sync to S3 (no-cache HTML)
        run: |
          aws s3 sync dist/ "s3://$S3_BUCKET/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths "/*"
